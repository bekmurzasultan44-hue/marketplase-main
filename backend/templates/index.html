<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PlayToys Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #6c5ce7; }
        .hero { background: white; padding: 60px 0; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark shadow-sm">
        <div class="container"><a class="navbar-brand" href="#">🧸 PlayToys Market</a></div>
    </nav>

    <div class="hero shadow-sm">
        <h1>Добро пожаловать в PlayToys!</h1>
        <p class="lead text-muted">Лучшие игрушки из нашей базы данных</p>
    </div>

    <div class="container">
        <div id="items-list" class="row g-4">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Загрузка товаров...</p>
            </div>
        </div>
    </div>

    <script>
        // Скрипт, который сам заберет данные из твоего API
        fetch('/items')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('items-list');
                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = '<div class="alert alert-info">В базе пока нет товаров, но API работает!</div>';
                } else {
                    data.forEach(item => {
                        list.innerHTML += `
                            <div class="col-md-4">
                                <div class="card h-100 shadow-sm">
                                    <div class="card-body">
                                        <h5 class="card-title">${item.name}</h5>
                                        <p class="card-text">${item.description || 'Нет описания'}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="badge bg-success fs-6">${item.price} ₸</span>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });
                }
            });
    </script>
</body>
</html>
